<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hello from Flask</title>
</head>
<body style="background: {{ color }};">
  <div style="color:#e4e4e4; text-align:center; padding:30px;">
    {% if name %}<h1>Hello from {{ name }}!</h1>{% else %}<h1>Hello, World!</h1>{% endif %}
    {% if contents %}<textarea rows="10" cols="50">{{ contents }}</textarea>{% endif %}
  </div>
</body>
</html>
